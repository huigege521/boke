# Nginx 虚拟主机配置
# 复制到 /etc/nginx/sites-available/ 目录，然后创建符号链接到 /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name example.com www.example.com;
    root /var/www/codeigniter-blog/public;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # 禁止访问敏感目录
    location ~ /(system|writable) {
        deny all;
    }

    # 日志配置
    access_log /var/log/nginx/codeigniter-blog.access.log;
    error_log /var/log/nginx/codeigniter-blog.error.log;
}
